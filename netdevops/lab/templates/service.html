<!DOCTYPE html>
<html>
  <head>
    
    <title>Service Instance</title>
        
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script> 
     
     
      
  </head>
  <body>
    <div class="container-fluid bg-light">
      <div class="row">
        <div class="col-md-4">
          <h1>Service Instance</h1>
        </div>
        <div class="col-md-8">
          <form class="float-right" method="POST" action=" ">
            <div class="form-row">
              <div class="form-group col-md-3 my-2">
                <label for="instance">Instance Name:</label>
                <input
                  type="text"
                  class="form-control"
                  name="instance_name"
                  required
                  
                />
              </div>
              <div class="form-group col-md-3 my-2">
                <label for="device">Device (R1, R2 or R3):</label>
                <input
                  type="text"
                  class="form-control"
                  name="device"
                  required
                  
                />
              </div>
              
              <div class="form-group col-md-3 my-2">
                <label for="intnumber">Interface Number:</label>
                <input
                  type="text"
                  class="form-control"
                  name="intf_number"
                  required
                  
                />
              </div>
              <div class="form-group col-md-3 my-2">
                <label for="fname">IP address:</label>
                <input
                  type="text"
                  class="form-control"
                  name="ip_add"
                  required
                  
                />
              </div>

              <div class="form-group col-md-3 my-2">
                <label for="shut">Shutdown R1 Interface</label>
                <input
                  type="checkbox"
                  class="form-control"
                  name="shutdown"
                  value="yes"
                  
                />
                <input
                  type="hidden"
                  class="form-control"
                  name="shutdown"
                  value="no"
                  
                />
              </div>
                
              <div class="form-group col-md-2 my-2">
                <button type="submit" class="btn btn-primary col">
                  Connect
                </button>
                
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    
    
    
  </body>
</html>
